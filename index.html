<!doctype html>
<html lang='en'>
<head>
<meta charset='utf-8'/>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<title>AFL Fridge Sheet</title>
<link rel='preconnect' href='https://fonts.googleapis.com'/>
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin/>
<link href='https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@600;700;800&display=swap' rel='stylesheet'/>
<style>
  * { box-sizing:border-box; }
  :root {
    --border-strong: 3px solid #000;
    --border-mid: 2px solid #000;
    --border-light: 1px solid #000;
    --radius-xl: 16px;
    --radius-lg: 12px;
    --radius-pill: 999px;
  }
  body { margin:0; font-family:'Trebuchet MS', Arial, sans-serif; background:#fff; color:#000; }
  .sheet { max-width:1200px; margin:0 auto; padding:10px; }
  .hero { border:var(--border-strong); border-radius:var(--radius-xl); padding:10px 12px; margin-bottom:8px; background:linear-gradient(130deg,#fff,#f7f7f7); text-align:center; }
  .hero-inner { display:grid; grid-template-columns:120px minmax(0,1fr) 120px; align-items:center; gap:10px; }
  .hero-art { width:100%; max-width:110px; height:auto; display:block; margin:0 auto; mix-blend-mode:multiply; }
  .hero-copy { min-width:0; }
  .hero h1 { margin:0; font-family:'Fredoka','Arial Rounded MT Bold','Trebuchet MS',sans-serif; font-size:40px; letter-spacing:1px; text-transform:uppercase; text-align:center; }
  .hero .mini { margin-top:4px; font-size:13px; font-weight:700; text-align:center; color:#333; font-family:'Nunito','Trebuchet MS','Segoe UI',sans-serif; }
  .setup-box { border:0; border-radius:0; padding:6px 0; margin-bottom:8px; background:#fff; color:#4d4d4d; }
  .setup-box.hidden { display:none; }
  .setup-summary { display:flex; align-items:center; justify-content:flex-start; min-height:18px; }
  .setup-summary-btn { display:inline-flex; align-items:center; gap:8px; border:0; background:transparent; color:#4d4d4d; padding:0; font:inherit; font-size:12px; font-weight:900; cursor:pointer; line-height:1; }
  .setup-summary-btn .chevron { display:inline-block; width:10px; text-align:center; transition:transform 0.15s ease; color:#4d4d4d; }
  .setup-content { display:flex; flex-direction:column; gap:4px; padding-top:4px; }
  .setup-box.collapsed .setup-content { display:none; }
  .setup-box:not(.collapsed) .setup-summary-btn .chevron { transform:rotate(180deg); }
  .players-panel { display:flex; flex-direction:column; gap:4px; align-items:center; }
  .owner-entry { display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; min-height:30px; }
  .owner-label { font-size:11px; font-weight:800; color:#4d4d4d; }
  .player-entry { display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; min-height:30px; }
  .owner-entry input,
  .player-entry input { width:160px; height:26px; border:1px solid #7a7a7a; border-radius:var(--radius-pill); padding:2px 8px; font:inherit; font-size:12px; text-align:center; background:#fff; color:#4d4d4d; }
  .owner-entry select { width:160px; height:26px; border:1px solid #7a7a7a; border-radius:var(--radius-pill); padding:2px 8px; font:inherit; font-size:12px; text-align:center; background:#fff; color:#4d4d4d; }
  .player-btn { height:26px; display:inline-flex; align-items:center; justify-content:center; border:1px solid #7a7a7a; border-radius:var(--radius-pill); background:#fff; color:#4d4d4d; padding:2px 8px; font:inherit; font-size:11px; font-weight:800; cursor:pointer; line-height:1; }
  .player-btn.secondary { background:#fff; color:#4d4d4d; }
  .player-help { font-size:11px; font-weight:700; color:#666; }
  .player-warning { min-height:14px; font-size:10px; font-weight:800; color:#4d4d4d; }
  .player-list { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .player-pill { display:inline-flex; align-items:center; gap:6px; border:1px solid #7a7a7a; border-radius:var(--radius-pill); padding:3px 9px; font-size:12px; font-weight:900; background:#fff; color:#4d4d4d; }
  .player-remove { border:0; background:transparent; color:#4d4d4d; font:inherit; font-weight:900; cursor:pointer; padding:0; line-height:1; }
  .layout { display:grid; grid-template-columns:1.02fr 1fr; gap:8px; align-items:start; }
  .left-col { display:grid; gap:8px; align-items:start; }
  .map-box { border:var(--border-strong); border-radius:var(--radius-xl); padding:10px; }
  .map-title { font-size:20px; font-weight:900; margin-bottom:8px; text-align:center; font-family:'Fredoka','Arial Rounded MT Bold','Trebuchet MS',sans-serif; }
  .map-wrap { position:relative; width:100%; border:0; border-radius:var(--radius-lg); overflow:hidden; background:#9fd4f6; }
  .map-img { display:block; width:100%; height:auto; }
  .map-lines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .map-callout { position:absolute; transform:translate(-50%,-50%); display:flex; align-items:center; z-index:3; }
  .target-marker { position:absolute; transform:translate(-50%,-50%); z-index:4; pointer-events:none; text-align:center; }
  .target-dot { width:12px; height:12px; border-radius:50%; background:#ffde00; border:var(--border-mid); margin:0 auto; }
  .target-label { margin-top:2px; padding:1px 4px; border:var(--border-light); background:rgba(255,255,255,0.9); font-size:10px; font-weight:900; white-space:nowrap; }
  .bubble-row { display:flex; gap:4px; align-items:center; }
  .bubble { min-width:24px; height:24px; border-radius:999px; background:#fff; color:#000; border:var(--border-mid); font-weight:900; font-size:12px; display:inline-flex; align-items:center; justify-content:center; text-align:center; padding:0 6px; }

  .map-note { margin-top:0; font-size:13px; font-weight:800; text-align:center; border-top:0; padding-top:0; }

  .cards { display:grid; gap:6px; }
  .card { border:var(--border-strong); border-radius:var(--radius-lg); padding:10px 12px; background:#fff; text-align:center; break-inside:avoid; page-break-inside:avoid; }
  .card-grid { display:grid; grid-template-columns:minmax(0, 3.1fr) minmax(142px, 0.46fr); gap:10px; align-items:stretch; }
  .card-main { display:flex; flex-direction:column; justify-content:center; min-width:0; padding:0 8px 0 4px; }
  .card-tips { border-left:var(--border-mid); padding:0 8px 0 14px; display:flex; align-items:stretch; background:#fff; min-width:0; }
  .teams { display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); gap:10px; align-items:center; justify-items:center; width:100%; }
  .side { display:flex; align-items:center; gap:6px; justify-content:center; min-width:0; width:100%; padding:0 1px; }
  .logo { width:38px; height:38px; border:0; background:transparent; object-fit:contain; padding:0; flex:0 0 auto; }
  .name { font-size:13px; line-height:1.05; font-weight:900; text-transform:none; white-space:nowrap; overflow:visible; text-overflow:clip; max-width:none; letter-spacing:-0.2px; }
  .vs { display:inline-block; min-width:16px; text-align:center; font-size:14px; color:#444; font-weight:800; line-height:1; padding:0 3px; }
  .meta { margin-top:8px; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pin { display:inline-flex; min-width:20px; height:20px; border-radius:50%; background:#fff; color:#000; align-items:center; justify-content:center; text-align:center; font-weight:900; font-size:12px; margin-right:0; padding:0 5px; border:var(--border-mid); flex:0 0 auto; }
  .meta-sep { color:#555; flex:0 0 auto; }
  .pick { font-size:11px; font-weight:900; display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; }
  .pick.empty { white-space:normal; overflow:visible; text-align:center; line-height:1.25; justify-content:center; width:100%; padding:0 10px; min-height:40px; }
  .pick.empty .tip-label { white-space:normal; text-align:center; max-width:100%; display:block; }
  .pick-stack { width:100%; display:flex; flex-direction:column; justify-content:space-evenly; gap:10px; padding:2px 0; }
  .tip-label { flex:0 0 auto; font-size:11px; min-width:38px; text-align:left; }
  .tip-blank { flex:1 1 0; min-width:0; height:18px; border-bottom:var(--border-mid); }
  .source { margin-top:6px; font-size:10px; font-weight:700; border-top:var(--border-mid); padding-top:4px; }

  @media print {
    @page { size:A4 landscape; margin:6mm; }
    body { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
    .sheet { max-width:none; padding:0; }
    .hero { padding:7px 9px; margin-bottom:5px; border-width:2px; }
    .hero-inner { grid-template-columns:74px minmax(0,1fr) 74px; gap:6px; }
    .hero-art { max-width:68px; }
    .hero h1 { font-size:28px; line-height:1; }
    .hero .mini { font-size:10px; margin-top:2px; }
    .setup-box { display:none; }
    .players-panel { display:none; }
    .owner-entry,
    .player-entry { gap:5px; }
    .owner-entry input,
    .player-entry input { width:110px; padding:3px 6px; border-width:1px; }
    .owner-entry select { width:110px; padding:3px 6px; border-width:1px; }
    .player-btn { padding:3px 8px; border-width:1px; font-size:9px; }
    .player-help { font-size:8px; }
    .player-warning { min-height:12px; font-size:8px; }
    .player-pill { font-size:8px; padding:2px 6px; border-width:1px; }
    .layout { grid-template-columns:49.5% 49.5%; gap:4px; }
    .left-col { gap:4px; }
    .map-box { padding:6px; border-width:2px; border-radius:10px; }
    .map-title { font-size:14px; margin-bottom:4px; }
    .map-wrap { border-width:1px; border-radius:8px; }
    .bubble { min-width:16px; height:16px; font-size:9px; border-width:1px; padding:0 4px; background:#fff; color:#000; display:inline-flex; align-items:center; justify-content:center; }
    .target-dot { width:8px; height:8px; border-width:1px; }
    .target-label { font-size:7px; padding:1px 3px; }
    .map-note { font-size:9px; margin-top:4px; padding-top:3px; border-top-width:1px; }
    .cards { gap:3px; }
    .card { padding:6px 7px; border-width:2px; border-radius:8px; }
    .card-grid { grid-template-columns:minmax(0, 3fr) minmax(94px, 0.42fr); gap:6px; }
    .card-tips { border-left-width:1px; padding:0 4px 0 8px; }
    .teams { gap:7px; }
    .side { gap:4px; }
    .logo { width:20px; height:20px; }
    .name { font-size:8px; letter-spacing:-0.12px; }
    .vs { min-width:10px; font-size:8px; padding:0 1px; color:#555; }
    .meta { margin-top:4px; font-size:8px; gap:4px; }
    .pin { min-width:14px; height:14px; font-size:9px; margin-right:3px; background:#fff; color:#000; border-width:1px; display:inline-flex; align-items:center; justify-content:center; }
    .pick { font-size:8px; gap:4px; }
    .pick.empty { line-height:1.15; padding:0 4px; min-height:28px; }
    .pick-stack { gap:5px; padding:1px 0; }
    .tip-label { font-size:8px; min-width:30px; }
    .tip-blank { height:10px; border-bottom-width:1px; }
    .source { margin-top:3px; font-size:8px; padding-top:2px; border-top-width:1px; }
  }
</style>
</head>
<body>

  <section class='hero'>
    <div class='hero-inner'>
      <img class='hero-art' src='Croc.jpg' alt='Croc footy art'/>
      <div class='hero-copy'>
        <h1 id='sheetTitle'>Fridge Footy: Round</h1>
        <div id='roundLabel' class='sub' style='display:none;'></div>
        <div class='mini'>Pick your winners, then find the games on the map.</div>
      </div>
      <img class='hero-art' src='Koala.jpg' alt='Koala footy art'/>
    </div>
  </section>

  <section class='layout'>

const PLAYER_STORAGE_KEY = 'aflTipSheet.players';
const OWNER_STORAGE_KEY = 'aflTipSheet.owner';
let inMemoryPlayers = [];
let inMemoryOwner = '';
let showCityTargets = false;

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, function(ch) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[ch];
  });
}

function loadPlayers() {
  try {
    const raw = localStorage.getItem(PLAYER_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    const players = Array.isArray(parsed) ? parsed.filter(Boolean).map(function(x) { return String(x).trim(); }).filter(Boolean) : [];
    inMemoryPlayers = players.slice();
    return players;
  } catch (e) {
    return inMemoryPlayers.slice();
  }
}

function savePlayers(players) {
  inMemoryPlayers = players.slice();
  try {
    localStorage.setItem(PLAYER_STORAGE_KEY, JSON.stringify(players));
  } catch (e) {}
}

function getPlayers() {
  return loadPlayers();
}

function loadOwner() {
  try {
    const raw = localStorage.getItem(OWNER_STORAGE_KEY);
    const owner = raw ? String(raw).trim() : '';
    inMemoryOwner = owner;
    return owner;
  } catch (e) {
    return inMemoryOwner;
  }
}

function saveOwner(owner) {
  inMemoryOwner = String(owner || '').trim();
  try {
    localStorage.setItem(OWNER_STORAGE_KEY, inMemoryOwner);
  } catch (e) {}
}

  function getOwner() {
    return loadOwner();
  }

function updateHeader(players, selectedRound) {
  const titleEl = document.getElementById('sheetTitle');
  const owner = getOwner();
  const roundSuffix = selectedRound ? ` Round ${selectedRound}` : '';
  let titleText = `Fridge Footy:${roundSuffix}`;
  if (owner) titleText = `${owner}'s Fridge Footy:${roundSuffix}`;
  if (titleEl) titleEl.textContent = titleText;
  document.title = titleText;
}

function renderPlayers() {
  const players = getPlayers();
  const list = document.getElementById('playerList');
  const warning = document.getElementById('playerWarning');
  const ownerSelect = document.getElementById('ownerSelect');
  let owner = getOwner();
  list.innerHTML = '';
  if (ownerSelect) {
    ownerSelect.innerHTML = "<option value=''>Choose player</option>";
  }
  if (owner && !players.includes(owner)) {
    owner = '';
    saveOwner('');
  }
  for (const player of players) {
    const pill = document.createElement('span');
    pill.className = 'player-pill';
    pill.innerHTML = `${escapeHtml(player)} <button class="player-remove" type="button" data-player="${escapeHtml(player)}">x</button>`;
    list.appendChild(pill);
    if (ownerSelect) {
      const option = document.createElement('option');
      option.value = player;
      option.textContent = player;
      option.selected = player === owner;
      ownerSelect.appendChild(option);
    }
  }
  if (warning) {
    warning.textContent = players.length > 4 ? 'More than 4 players may not fit cleanly on one printed page.' : '';
  }
  updateHeader(players);
}

function roundSortValue(r) { return r === 'OR' ? 0 : parseInt(r,10); }
function fmtAwst(iso) {
  const d = new Date(iso);
  const wd = d.toLocaleDateString('en-AU', { weekday:'short', timeZone:'Australia/Perth' });
  const day = d.toLocaleDateString('en-AU', { day:'2-digit', timeZone:'Australia/Perth' });
  const mon = d.toLocaleDateString('en-AU', { month:'short', timeZone:'Australia/Perth' });
  const tm = d.toLocaleTimeString('en-AU', { hour:'numeric', minute:'2-digit', hour12:true, timeZone:'Australia/Perth' });
  return `${wd} ${day} ${mon} - ${tm}`;
}

function pickRound(fixtures, nowMs) {
  const byRound = new Map();
  for (const f of fixtures) {
    if (!byRound.has(f.round)) byRound.set(f.round, []);
    byRound.get(f.round).push(f);
  }
  const rounds = [...byRound.keys()].sort((a,b) => roundSortValue(a)-roundSortValue(b));
  for (const r of rounds) {
    const times = byRound.get(r).map(x => new Date(x.date_awst).getTime());
    const first = Math.min(...times);
    const hasFuture = times.some(t => t >= nowMs);
    if (first <= nowMs && hasFuture) return r;
  }
  const future = rounds.map(r => ({ r, first: Math.min(...byRound.get(r).map(x => new Date(x.date_awst).getTime())) }))
                       .filter(x => x.first > nowMs)
                       .sort((a,b)=>a.first-b.first);
  if (future.length) return future[0].r;
  return rounds[rounds.length-1];
}

function assignLaneY(groups) {
  const minGap = 8;
  groups.sort((a,b)=>a.anchorY-b.anchorY);
  for (let i=0;i<groups.length;i++) {
    groups[i].y = Math.max(10, Math.min(90, groups[i].anchorY));
    if (i>0 && groups[i].y - groups[i-1].y < minGap) groups[i].y = groups[i-1].y + minGap;
  }
  for (let i=groups.length-2;i>=0;i--) {
    if (groups[i+1].y > 90) groups[i+1].y = 90;
    if (groups[i+1].y - groups[i].y < minGap) groups[i].y = groups[i+1].y - minGap;
    groups[i].y = Math.max(10, groups[i].y);
  }
}

function render() {
  const players = getPlayers();
  const selectedRound = pickRound(FIXTURES, Date.now());
  const matches = FIXTURES.filter(f => f.round === selectedRound).sort((a,b)=>new Date(a.date_awst)-new Date(b.date_awst));
  updateHeader(players, selectedRound);

  const mapWrap = document.getElementById('mapWrap');
  const mapLines = document.getElementById('mapLines');
  const cards = document.getElementById('cards');
  mapWrap.querySelectorAll('.map-callout').forEach(x=>x.remove());
  mapWrap.querySelectorAll('.target-marker').forEach(x=>x.remove());
  mapLines.querySelectorAll('line').forEach(x=>x.remove());
  cards.innerHTML = '';

  // Stadium numbering (one number per unique venue in this round)
  const venues = [];
  for (const m of matches) if (!venues.includes(m.venue)) venues.push(m.venue);
  const venueNo = new Map(venues.map((v,i)=>[v,i+1]));

  // Group by city for map callouts; each callout lists venue numbers
  const byCity = new Map();
  for (const m of matches) {
    const city = VENUE_CITY[m.venue] || m.venue;
    if (!byCity.has(city)) byCity.set(city, []);
    byCity.get(city).push(m);
  }

  const groups = [...byCity.entries()].map(([city, arr]) => {
    const xy = CITY_ANCHOR_XY[city] || [50,60];
    return { city, arr, anchorX: xy[0], anchorY: xy[1] };
  });

  const right = groups.filter(g=>g.anchorX>=50);
  const left = groups.filter(g=>g.anchorX<50);
  assignLaneY(right); assignLaneY(left);
  for (const g of right) g.tx = 96;
  for (const g of left) g.tx = 4;

  for (const g of [...right, ...left]) {
    if (g.city === 'Sydney') { g.tx = 98; g.y = Math.min(88, g.y + 2); }
    const c = document.createElement('div');
    c.className = 'map-callout';
    c.style.left = g.tx + '%';
    c.style.top = g.y + '%';

    const row = document.createElement('div');
    row.className = 'bubble-row';
    const nums = [...new Set(g.arr.map(x=>venueNo.get(x.venue)))].sort((a,b)=>a-b);
    for (const n of nums) {
      const b = document.createElement('span');
      b.className = 'bubble';
      b.textContent = n;
      row.appendChild(b);
    }
    c.appendChild(row);
    mapWrap.appendChild(c);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', String(g.tx));
    line.setAttribute('y1', String(g.y));
    line.setAttribute('x2', String(g.anchorX));
    line.setAttribute('y2', String(g.anchorY));
    line.setAttribute('stroke', '#000');
    line.setAttribute('stroke-width', '0.6');
    line.setAttribute('marker-end', 'url(#arrowHead)');
    mapLines.appendChild(line);
  }

  if (showCityTargets) {
    Object.entries(CITY_ANCHOR_XY).forEach(function(entry) {
      const city = entry[0];
      const xy = entry[1];
      const marker = document.createElement('div');
      marker.className = 'target-marker';
      marker.style.left = xy[0] + '%';
      marker.style.top = xy[1] + '%';
      marker.innerHTML = `<div class='target-dot'></div><div class='target-label'>${city}</div>`;
      mapWrap.appendChild(marker);
    });
  }

  for (const m of matches) {
    const vno = venueNo.get(m.venue);
    const card = document.createElement('article');
    card.className = 'card';
    const meta = `<span>${fmtAwst(m.date_awst)}</span><span class='meta-sep'>|</span><span class='pin'>${vno}</span><span>${m.venue}</span>`;
    const pickLines = players.length
      ? players.map(function(player) {
          return `<div class='pick'><span class='tip-label'>${escapeHtml(player)}:</span><span class='tip-blank'></span></div>`;
        }).join('')
      : `<div class='pick empty'><span class='tip-label'>Add players and start tipping!</span></div>`;
    card.innerHTML = `
      <div class='card-grid'>
        <div class='card-main'>
          <div class='teams'>
            <div class='side'><img class='logo' src='${TEAM_FILE[m.home]||''}' alt='${m.home} logo'/><div class='name'>${m.home}</div></div>
            <div class='vs'>v</div>
            <div class='side'><img class='logo' src='${TEAM_FILE[m.away]||''}' alt='${m.away} logo'/><div class='name'>${m.away}</div></div>
          </div>
          <div class='meta'>${meta}</div>
        </div>
        <div class='card-tips'>
          <div class='pick-stack'>${pickLines}</div>
        </div>
      </div>
    `;
    cards.appendChild(card);
  }
}

document.getElementById('addPlayerBtn').addEventListener('click', function() {
  const input = document.getElementById('playerNameInput');
  const name = input.value.trim();
  if (!name) return;
  const players = getPlayers();
  if (!players.includes(name)) {
    players.push(name);
    savePlayers(players);
    renderPlayers();
    render();
  }
  input.value = '';
  input.focus();
});

document.getElementById('toggleSetupBtn').addEventListener('click', function() {
  const setupBox = document.getElementById('setupBox');
  const collapsed = setupBox.classList.toggle('collapsed');
  this.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
});

document.getElementById('playerNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('addPlayerBtn').click();
  }
});

document.getElementById('ownerSelect').addEventListener('change', function() {
  saveOwner(this.value || '');
  renderPlayers();
  render();
});

document.getElementById('clearPlayersBtn').addEventListener('click', function() {
  savePlayers([]);
  saveOwner('');
  renderPlayers();
  render();
});

document.getElementById('playerList').addEventListener('click', function(e) {
  const btn = e.target.closest('.player-remove');
  if (!btn) return;
  const player = btn.getAttribute('data-player');
  const players = getPlayers().filter(function(name) { return name !== player; });
  savePlayers(players);
  if (getOwner() === player) saveOwner('');
  renderPlayers();
  render();
});

renderPlayers();
render();
</script>
